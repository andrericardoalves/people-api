quarkus:
  datasource:
    db-kind: postgresql
    username: test
    password: test
    jdbc:
      url:
  hibernate-orm:
    schema-management:
      strategy: none
    metrics:
      enabled: true
    jdbc:
      statement-fetch-size: 3
      statement-batch-size: 3
      order-inserts: true
      order-updates: true

    log:
      bind-parameters: true
  flyway:
    migrate-at-start: true
    locations: classpath:db/migration
