quarkus:
  datasource:
    db-kind: postgresql
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PW}
    jdbc:
      url: jdbc:postgresql://localhost:5432/people-db
  hibernate-orm:
    schema-management:
      strategy: none
  flyway:
    migrate-at-start: true
    locations: classpath:db/migration
